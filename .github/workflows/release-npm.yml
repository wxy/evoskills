name: Release to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          test "$TAG_VERSION" = "$PKG_VERSION"

      - name: Skip if version already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version already published: $PKG_NAME@$PKG_VERSION"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Trusted Publishing via OIDC)
        if: steps.check.outputs.already_published == 'false' && secrets.NPM_TOKEN == ''
        run: |
          echo "Publishing via Trusted Publishing (OIDC), no NPM token required"
          npm publish --access public --provenance

      - name: Publish to npm (Granular token fallback)
        if: steps.check.outputs.already_published == 'false' && secrets.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing via NPM_TOKEN fallback"
          npm publish --access public --provenance
